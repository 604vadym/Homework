<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tables</title>
  </head>
  <body>
    <style>
      td {
        border: 10px solid black;
      }
    </style>
    <table
      width="858"
      height="790"
      bgcolor="white"
      style="border-collapse: collapse; table-layout: fixed"
    >
      <tr height="78">
        <td rowspan="3" colspan="8"></td>
        <td rowspan="3" colspan="14"></td>
        <td rowspan="3" colspan="10" bgcolor="yellow"></td>
        <td rowspan="22"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr height="208">
        <td rowspan="8" colspan="4"></td>
        <td rowspan="15" colspan="18" bgcolor="red"></td>
        <td rowspan="8" colspan="10" bgcolor="yellow"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr height="182">
        <td rowspan="11" colspan="4"></td>
        <td rowspan="7" colspan="5"></td>
        <td rowspan="7" colspan="5"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr>
        <td rowspan="8" colspan="9" bgcolor="black"></td>
        <td rowspan="4" colspan="9"></td>
        <td rowspan="4" colspan="10"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr>
        <td height="8" rowspan="8" colspan="4" bgcolor="yellow"></td>
        <td rowspan="4" colspan="9"></td>
        <td rowspan="7" colspan="10" bgcolor="blue"></td>
        <td rowspan="8" bgcolor="red"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr></tr>
      <tr>
        <td rowspan="4" colspan="9"></td>
        <td rowspan="3" colspan="9" bgcolor="black"></td>
      </tr>
      <tr></tr>
      <tr></tr>
      <tr height="26">
        <td colspan="19"></td>
      </tr>
    </table>
  </body>
</html>
